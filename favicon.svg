<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="100%" stop-color="#0a3d7a"/>
    </radialGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.25"/>
    </radialGradient>
  </defs>

  <!-- ocean -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- landmasses -->
  <g fill="#2e9e5a" opacity="0.85">
    <!-- North America -->
    <path d="M14 16 Q16 13 20 14 Q22 12 24 13 L26 16 Q28 15 27 18 L24 22 Q22 24 20 23 L18 25 Q15 24 14 21 Z"/>
    <!-- South America -->
    <path d="M22 30 Q24 28 26 30 L27 34 Q28 37 26 40 Q25 43 23 42 L21 38 Q20 35 21 32 Z"/>
    <!-- Europe -->
    <path d="M30 14 Q32 13 34 14 L35 17 Q33 18 31 17 Z"/>
    <!-- Africa -->
    <path d="M32 22 Q34 20 36 21 L38 25 Q39 29 38 33 Q37 36 35 35 L33 31 Q31 27 32 24 Z"/>
    <!-- Asia -->
    <path d="M36 12 Q40 11 44 13 Q47 14 48 17 L46 20 Q44 22 42 21 L38 19 Q36 17 36 14 Z"/>
    <!-- Australia -->
    <path d="M44 34 Q46 33 48 34 L48 37 Q47 38 45 37 Z"/>
  </g>

  <!-- shine overlay -->
  <circle cx="32" cy="32" r="30" fill="url(#shine)"/>

  <!-- edge shadow for 3D depth -->
  <circle cx="32" cy="32" r="30" fill="url(#shadow)"/>

  <!-- specular highlight -->
  <ellipse cx="22" cy="20" rx="8" ry="6" fill="white" opacity="0.18"/>
</svg>
